<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Sign up | inHire</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-950 text-white"><main class="mx-auto flex min-h-screen max-w-md items-center px-6"><form action="/signup-form" method="post" class="w-full rounded-3xl border border-white/10 bg-white/5 p-8"><a href="/" class="text-sm text-cyan-300">Home</a><h1 class="mt-6 text-4xl font-black">Join inHire</h1>{% if error %}<div class="mt-4 rounded-xl bg-red-500/20 p-3 text-red-100">{{ error }}</div>{% endif %}<label class="mt-6 block text-sm text-slate-300">Name</label><input class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900 p-3" name="name" required><label class="mt-4 block text-sm text-slate-300">Email</label><input class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900 p-3" name="email" type="email" required><label class="mt-4 block text-sm text-slate-300">Password</label><input class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900 p-3" name="password" type="password" required><label class="mt-4 block text-sm text-slate-300">Role</label><select class="mt-2 w-full rounded-xl border border-white/10 bg-slate-900 p-3" name="role"><option value="candidate">Candidate</option><option value="hr_senior">HR Senior</option><option value="hr_junior">HR Junior</option><option value="hr_intern">HR Intern</option></select><button class="mt-6 w-full rounded-xl bg-cyan-400 p-3 font-black text-slate-950">Create account</button></form></main></body></html>
